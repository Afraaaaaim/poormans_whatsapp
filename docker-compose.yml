# docker-compose.yml

services:

  # ── Redis broker ──────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI app ───────────────────────────────
  app:
    image: myapp:latest
    restart: unless-stopped
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8081:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery worker ─────────────────────────────
  celery_worker:
    image: myapp:latest
    restart: unless-stopped
    command: >
      uv run celery -A once.celery_app worker
      --loglevel=info
      --concurrency=1
      --queues=celery
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Beat scheduler ─────────────────────
  celery_beat:
    image: myapp:latest
    restart: unless-stopped
    command: >
      uv run celery -A once.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /app/logs/celerybeat-schedule
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  # ── MCP Server ────────────────────────────────
  mcp-server:
    image: myapp:latest
    restart: unless-stopped
    command: uv run python -m mcpserver.mcp_server
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8090"
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy