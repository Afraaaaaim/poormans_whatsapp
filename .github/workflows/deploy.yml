name: Deploy to Cathedral

on:
  push:
    branches:
      - deployment

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: myapp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tarball
        run: docker save myapp:latest | gzip > myapp.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: scp myapp.tar.gz ${SERVER_USER}@${SERVER_HOST}:/tmp/myapp.tar.gz

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        run: |
          ssh ${SERVER_USER}@${SERVER_HOST} << EOF
            set -e
            cd ${SERVER_PATH}

            git fetch origin
            git checkout deployment
            git pull origin deployment

            # Load the pre-built image (no build on server)
            docker load < /tmp/myapp.tar.gz
            rm /tmp/myapp.tar.gz

            # Restart only — image already loaded
            docker compose up -d --pull never --remove-orphans

            docker image prune -f
          EOF